requirements:
  - id: SCI-HELM-001
    type: FR
    title: Helm chart for API service
    description: "Chart MUST define a Deployment for the sdd-coverage Rust API container with configurable image, replicas, resource limits, liveness probe on /healthcheck (initialDelaySeconds: 10, periodSeconds: 15), and readiness probe on /healthcheck (initialDelaySeconds: 5, periodSeconds: 5)."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-HELM-002
    type: FR
    title: PostgreSQL deployment
    description: "Chart MUST deploy PostgreSQL via Bitnami subchart or custom StatefulSet with PVC for data persistence."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-HELM-003
    type: FR
    title: Frontend deployment
    description: "Chart MUST deploy an nginx container serving the pre-built Next.js static export."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-HELM-004
    type: FR
    title: Ingress routing
    description: "Chart MUST define an Ingress resource routing /api/* to the API service and / to the frontend."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-HELM-005
    type: FR
    title: Secrets and ConfigMaps
    description: "Chart MUST use a Secret for database credentials and a ConfigMap for application configuration."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-HELM-006
    type: FR
    title: DRY configuration
    description: "Every configurable value MUST be defined in values.yaml. Shared labels MUST use a _helpers.tpl partial."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-ANS-001
    type: FR
    title: Ansible orchestration
    description: "Playbook MUST deploy the Helm chart in correct order with waits."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-ANS-002
    type: FR
    title: Post-deploy validation
    description: "Ansible MUST verify healthcheck, stats, pods, and PostgreSQL."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-ANS-003
    type: FR
    title: Idempotency
    description: "Running the playbook twice MUST produce zero changes on the second run."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-CI-001
    type: FR
    title: CI pipeline
    description: "GitHub Actions workflow MUST run helm lint, ansible-lint, and yamllint on every push."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-CI-002
    type: FR
    title: Manifest validation
    description:  "CI MUST render Helm templates and validate against Kubernetes schemas using kubeconform."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-TRACE-001
    type: FR
    title: Traceability annotations
    description: "Every Helm template file, every Ansible task file, and every CI job MUST contain a @req annotation."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
  - id: SCI-SEC-001
    type: AR
    title: Security baseline
    description: "API and frontend containers MUST run as non-root user. No latest tags."
    createdAt: "2026-03-01T00:00:00Z"
    updatedAt: "2026-03-01T00:00:00Z"
