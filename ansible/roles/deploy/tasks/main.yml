# @req SCI-ANS-001, SCI-ANS-003
---
- name: Create namespace
  ansible.builtin.shell: kubectl get namespace {{ namespace }} || kubectl create namespace {{ namespace }}
  register: ns_result
  changed_when: "'created' in ns_result.stdout"

- name: Create database credentials secret
  ansible.builtin.shell: |
    kubectl get secret sdd-db-credentials -n {{ namespace }} || \
    kubectl create secret generic sdd-db-credentials \
      --from-literal=password="{{ lookup('env', 'SDD_DB_PASSWORD') | default('changeme', true) }}" \
      --from-literal=postgres-password="{{ lookup('env', 'SDD_DB_PASSWORD') | default('changeme', true) }}" \
      -n {{ namespace }}
  register: secret_result
  changed_when: "'created' in secret_result.stdout"
  no_log: true

- name: Add Bitnami Helm repository
  ansible.builtin.shell: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update
  changed_when: false

- name: Update Helm chart dependencies
  ansible.builtin.shell: helm dependency update {{ chart_path }}
  changed_when: false

- name: Deploy SDD Navigator via Helm
  ansible.builtin.shell: |
    helm upgrade --install {{ release_name }} {{ chart_path }} \
      --namespace {{ namespace }} \
      --create-namespace \
      --wait --timeout 5m
  changed_when: false

- name: Wait for API pods
  ansible.builtin.shell: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=api -n {{ namespace }} --timeout=120s
  changed_when: false

- name: Wait for frontend pods
  ansible.builtin.shell: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=frontend -n {{ namespace }} --timeout=120s
  changed_when: false

- name: Wait for PostgreSQL
  ansible.builtin.shell: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=postgresql -n {{ namespace }} --timeout=180s
  changed_when: false
