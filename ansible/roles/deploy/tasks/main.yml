# @req SCI-ANS-001, SCI-ANS-003
---
- name: Create namespace
  ansible.builtin.command:
    cmd: kubectl get namespace {{ k8s_namespace }}
  register: deploy_ns_check
  changed_when: false
  failed_when: false

- name: Create namespace if missing
  ansible.builtin.command:
    cmd: kubectl create namespace {{ k8s_namespace }}
  when: deploy_ns_check.rc != 0
  changed_when: true

- name: Check if db secret exists
  ansible.builtin.command:
    cmd: kubectl get secret sdd-db-credentials -n {{ k8s_namespace }}
  register: deploy_secret_check
  changed_when: false
  failed_when: false

- name: Create database credentials secret
  ansible.builtin.command:
    cmd: >
      kubectl create secret generic sdd-db-credentials
      --from-literal=password={{ lookup('env', 'SDD_DB_PASSWORD') | default('changeme', true) }}
      --from-literal=postgres-password={{ lookup('env', 'SDD_DB_PASSWORD') | default('changeme', true) }}
      -n {{ k8s_namespace }}
  when: deploy_secret_check.rc != 0
  changed_when: true
  no_log: true

- name: Add Bitnami Helm repository
  ansible.builtin.command:
    cmd: helm repo add bitnami https://charts.bitnami.com/bitnami
  changed_when: false
  failed_when: false

- name: Update Helm repositories
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: Update Helm chart dependencies
  ansible.builtin.command:
    cmd: helm dependency update {{ chart_path }}
  changed_when: false

- name: Deploy SDD Navigator via Helm
  ansible.builtin.command:
    cmd: >
      helm upgrade --install {{ release_name }} {{ chart_path }}
      --namespace {{ k8s_namespace }}
      --create-namespace
      --wait --timeout 5m
  changed_when: false

- name: Wait for API pods
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=api -n {{ k8s_namespace }} --timeout=120s
  changed_when: false

- name: Wait for frontend pods
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=frontend -n {{ k8s_namespace }} --timeout=120s
  changed_when: false

- name: Wait for PostgreSQL
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=postgresql -n {{ k8s_namespace }} --timeout=180s
  changed_when: false
