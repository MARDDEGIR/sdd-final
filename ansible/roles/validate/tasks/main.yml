# @req SCI-ANS-002, SCI-ANS-003
---
- name: Check API healthcheck
  ansible.builtin.shell: |
    kubectl run curl-test --image=curlimages/curl:8.5.0 --restart=Never --rm -i -n {{ namespace }} \
      -- curl -s -w "%{http_code}" -o /dev/null http://{{ release_name }}-api:8080/healthcheck
  register: healthcheck_result
  changed_when: false
  ignore_errors: true

- name: Report healthcheck
  ansible.builtin.debug:
    msg: "HEALTHCHECK: {{ 'PASS' if healthcheck_result.stdout == '200' else 'FAIL' }}"

- name: Check API stats
  ansible.builtin.shell: |
    kubectl run curl-stats --image=curlimages/curl:8.5.0 --restart=Never --rm -i -n {{ namespace }} \
      -- curl -s -w "%{http_code}" -o /dev/null http://{{ release_name }}-api:8080/stats
  register: stats_result
  changed_when: false
  ignore_errors: true

- name: Report stats
  ansible.builtin.debug:
    msg: "STATS: {{ 'PASS' if stats_result.stdout == '200' else 'FAIL' }}"

- name: Check all pods Running
  ansible.builtin.shell: kubectl get pods -n {{ namespace }} --field-selector=status.phase!=Running --no-headers 2>/dev/null | wc -l
  register: non_running
  changed_when: false

- name: Report pods
  ansible.builtin.debug:
    msg: "PODS RUNNING: {{ 'PASS' if non_running.stdout | int == 0 else 'FAIL' }}"

- name: Check PostgreSQL
  ansible.builtin.shell: |
    kubectl exec -n {{ namespace }} \
      $(kubectl get pod -n {{ namespace }} -l app.kubernetes.io/name=postgresql -o jsonpath="{.items[0].metadata.name}") \
      -- pg_isready -U {{ db_user }} -d {{ db_name }}
  register: pg_result
  changed_when: false
  ignore_errors: true

- name: Report PostgreSQL
  ansible.builtin.debug:
    msg: "POSTGRESQL: {{ 'PASS' if pg_result.rc == 0 else 'FAIL' }}"

- name: Summary
  ansible.builtin.debug:
    msg:
      - "===== VALIDATION SUMMARY ====="
      - "HEALTHCHECK:  {{ 'PASS' if healthcheck_result.stdout == '200' else 'FAIL' }}"
      - "STATS:        {{ 'PASS' if stats_result.stdout == '200' else 'FAIL' }}"
      - "PODS RUNNING: {{ 'PASS' if non_running.stdout | int == 0 else 'FAIL' }}"
      - "POSTGRESQL:   {{ 'PASS' if pg_result.rc == 0 else 'FAIL' }}"
      - "=============================="
