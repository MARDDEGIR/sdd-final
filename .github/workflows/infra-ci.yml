name: Infrastructure CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
        with:
          version: "3.14.0"
      - run: helm repo add bitnami https://charts.bitnami.com/bitnami
      - run: helm dependency update charts/sdd-navigator
      - run: helm lint charts/sdd-navigator --strict
      - run: yamllint .
        env:
          YAMLLINT_CONFIG_FILE: .yamllint

  helm-validate:
    name: Helm Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
        with:
          version: "3.14.0"
      - run: helm repo add bitnami https://charts.bitnami.com/bitnami
      run: helm dependency update charts/sdd-navigator
      - run: helm template charts/sdd-navigator | kubeconform -kubernetes-version 1.28 -strict
        env:
        

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ansible/setup-controller@v2
      - run: ansible-lint .
      - run: ./scripts/check-traceability.sh

  traceability:
    name: Traceability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-traceability.sh

  ci-summary:
    name: CI Summary
    needs: [yamllint, helm-validate, ansible-lint, traceability]
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "All checks passed"
