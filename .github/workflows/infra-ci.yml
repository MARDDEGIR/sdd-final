# @req SCI-CI-001, SCI-CI-002
name: Infrastructure CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - run: helm repo add bitnami https://charts.bitnami.com/bitnami
      - run: helm dependency update charts/sdd-navigator
      # @req SCI-CI-001
      - run: helm lint charts/sdd-navigator --strict

  helm-validate:
    name: Helm Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz -C /usr/local/bin
      - run: helm repo add bitnami https://charts.bitnami.com/bitnami
      - run: helm dependency update charts/sdd-navigator
      # @req SCI-CI-002
      - run: helm template sdd-navigator charts/sdd-navigator | kubeconform --strict --summary --ignore-missing-schemas

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install ansible-lint
      # @req SCI-CI-001
      - run: ansible-lint ansible/

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint
      # @req SCI-CI-001
      - run: yamllint -d relaxed .

  traceability:
    name: Traceability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # @req SCI-TRACE-001
      - run: bash scripts/check-traceability.sh

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [helm-lint, helm-validate, ansible-lint, yamllint, traceability]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| helm-lint | ${{ needs.helm-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| helm-validate | ${{ needs.helm-validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ansible-lint | ${{ needs.ansible-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| yamllint | ${{ needs.yamllint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| traceability | ${{ needs.traceability.result }} |" >> $GITHUB_STEP_SUMMARY
